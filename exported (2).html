<script>
(function(){
var COLD_IBO_MAX=50;
var Tuan_IBO_store=[];
var Z_IBO={
up:document.getElementById('cibo_up'),
fi:document.getElementById('cibo_fi'),
url:document.getElementById('cibo_url'),
add:document.getElementById('cibo_add'),
ct:document.getElementById('cibo_ct'),
ts:document.getElementById('cibo_ts')
};
function CeNsY_IBO_tip(m){Z_IBO.ts.textContent=m;Z_IBO.ts.classList.add('sh');setTimeout(function(){Z_IBO.ts.classList.remove('sh')},1500)}
function CENSY_IBO_updateCt(){Z_IBO.ct.textContent=Tuan_IBO_store.length+' 张'}
function Z_CONFIG_IBO_add(u){
if(Tuan_IBO_store.length>=COLD_IBO_MAX){CeNsY_IBO_tip('已达上限');return}
Tuan_IBO_store.push(u);CENSY_IBO_updateCt();CeNsY_IBO_tip('已添加 ✓');
}
function Tuan_IBO_readFiles(fs){
Array.from(fs).forEach(function(f){
var r=new FileReader();r.onload=function(ev){Z_CONFIG_IBO_add(ev.target.result)};r.readAsDataURL(f);
});
}
Z_IBO.up.addEventListener('click',function(){Z_IBO.fi.click()});
Z_IBO.fi.addEventListener('change',function(e){Tuan_IBO_readFiles(e.target.files);e.target.value=''});
Z_IBO.up.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('dg')});
Z_IBO.up.addEventListener('dragleave',function(){this.classList.remove('dg')});
Z_IBO.up.addEventListener('drop',function(e){e.preventDefault();this.classList.remove('dg');Tuan_IBO_readFiles(e.dataTransfer.files)});
Z_IBO.add.addEventListener('click',function(){var v=Z_IBO.url.value.trim();if(v){Z_CONFIG_IBO_add(v);Z_IBO.url.value=''}else{CeNsY_IBO_tip('请输入链接')}});
Z_IBO.url.addEventListener('keydown',function(e){if(e.key==='Enter'){var v=this.value.trim();if(v){Z_CONFIG_IBO_add(v);this.value=''}}});
})();
</script>
